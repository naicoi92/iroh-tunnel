# Build release binaries and attach them to a GitHub Release on tag push.
#
# Targets (per T-14): Linux x86_64, Linux aarch64, macOS aarch64.
# Linux aarch64 is cross-compiled from x86_64 via `cross`; the other two build
# natively on a matching runner.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Default permissions are read-only; the release job below escalates to
# contents:write just for publishing.
permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: false
            artifact: iroh-tunnel-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
            artifact: iroh-tunnel-aarch64-linux
          - target: aarch64-apple-darwin
            runner: macos-14
            use-cross: false
            artifact: iroh-tunnel-aarch64-macos
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned to match rust-version)
        run: |
          rustup toolchain install 1.91 --profile minimal --no-self-update
          rustup default 1.91
          rustup target add ${{ matrix.target }} --toolchain 1.91

      - name: Install cross (pinned release)
        if: ${{ matrix.use-cross }}
        run: cargo +1.91 install cross --version 0.2.5 --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross +1.91 build --release --target ${{ matrix.target }}
          else
            cargo +1.91 build --release --target ${{ matrix.target }}
          fi

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/iroh-tunnel dist/${{ matrix.artifact }}
          tar -C dist -czf dist/${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    # Only create/publish a GitHub Release for real tag pushes (not manual runs).
    if: startsWith(github.ref, 'refs/tags/v')
    # This job uploads release assets, so it (and only it) needs write access.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release with binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
